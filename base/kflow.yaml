name: Base
description: Run one BET base model from a clear R-launched model row.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/bet2026-flow:latest
resources:
  cpus: 8
  memory: 32GB
  disk: 120GB
output_patterns:
  - outputs/**
job_config:
  optional:
    - RUN_LABEL
    - JOB_KEY
    - JOB_TITLE
    - JOB_DESCRIPTION
    - MODEL_KEY
    - MODEL_TOKEN
    - MODEL_NAME
    - BASE_MODEL_KEY
    - CHANGE_TOKEN
    - CHANGE_GROUP
    - CHANGE_SUMMARY
    - INPUT_VARIANT
    - SOURCE_REPO
    - SOURCE_REF
    - MFCL_BACKEND
    - BACKEND_SCRIPT
    - BACKEND_COMMAND
    - PROGRAM_PATH
    - MAKE_TARGETS
    - MAKE_VARS
    - BASE_DIR
    - MODEL_DIR
    - PATCH_SCRIPT
    - PATCH_INPUT_DIR
    - PATCH_OUTPUT_DIR
    - PATCH_ARGS
    - COLLECT_PATHS
    - MFCLKIT_SCRIPT
