name: tuna-flow-diagnostics
description: Run one tuna assessment diagnostics job from either a base job or a sensitivity job.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/tuna-flow:latest
resources:
  cpus: 2
  memory: 12GB
  disk: 5GB
output_patterns:
  - outputs/**
job_config:
  optional:
    - RUN_LABEL
    - FLOW_SPECIES
    - FLOW_SPECIES_LABEL
    - FLOW_ASSESSMENT_YEAR
    - FLOW_TASK_PREFIX
    - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
    - FLOW_GROUP
    - FLOW_SOURCE_REPO
    - FLOW_SOURCE_REF
    - FLOW_SOURCE_PATH
    - JOB_KEY
    - JOB_TITLE
    - JOB_DESCRIPTION
    - MODEL_KEY
    - MODEL_TOKEN
    - MODEL_NAME
    - MODEL_LABEL
    - PLOT_LABEL
    - REPORT_LABEL
    - BASE_MODEL_KEY
    - PARENT_MODEL_KEY
    - PARENT_MODEL_TOKEN
    - CHANGE_TOKEN
    - CHANGE_GROUP
    - CHANGE_DETAIL
    - CHANGE_SUMMARY
    - RECIPE_TOKEN
    - RECIPE_FAMILY
    - RECIPE_LABEL
    - INPUT_VARIANT
    - INPUT_TASK
    - INPUT_KEY
    - SOURCE_REPO
    - SOURCE_REF
    - SOURCE_PATH
    - USE_FLOW_SOURCE
    - USE_LOCAL_SOURCE
    - MFCL_BACKEND
    - BACKEND_SCRIPT
    - BACKEND_COMMAND
    - PROGRAM_PATH
    - FLOW_MFCL_PROGRAM
    - MAKE_TARGETS
    - MAKE_VARS
    - BASE_DIR
    - FLOW_BASE_INPUT_DIR
    - MODEL_DIR
    - PATCH_SCRIPT
    - PATCH_INPUT_DIR
    - PATCH_OUTPUT_DIR
    - PATCH_ARGS
    - JITTER_SEED
    - JITTER_CV
    - JITTER_SMOKE_ONLY
    - RETRO_PEEL
    - N_MIXING_PERIODS
    - HESSIAN_PART
    - NSPLIT
    - DIAGNOSTIC_SEED_GLOB
    - DIAGNOSTIC_SEED_COPY_TO
    - COLLECT_PATHS
    - MFCLKIT_SCRIPT
    - MFCLSHINY_SCRIPT
    - REPORT_TEMPLATE_DIR
    - REPORT_TEMPLATE_MAIN
    - REPORT_RENDER_FORMAT
