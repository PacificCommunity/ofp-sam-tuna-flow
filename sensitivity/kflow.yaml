name: tuna-flow-sensitivity
description: Run one tuna assessment sensitivity model job from a selected base job.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/tuna-flow:latest
resources:
  cpus: 2
  memory: 12GB
  disk: 5GB
output_patterns:
  - outputs/**
job_config:
  optional:
    - RUN_LABEL
    - FLOW_SPECIES
    - FLOW_SPECIES_LABEL
    - FLOW_ASSESSMENT_YEAR
    - FLOW_TASK_PREFIX
    - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
    - KFLOW_RUNTIME_UPDATE
    - TUNA_FLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
    - TUNA_FLOW_RUNTIME_UPDATE
    - KFLOW_RUNTIME_PACKAGES
    - KFLOW_RUNTIME_GITHUB_AUTH
    - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
    - FLOW_GROUP
    - FLOW_SOURCE_REPO
    - FLOW_SOURCE_REF
    - FLOW_SOURCE_PATH
    - JOB_KEY
    - JOB_TITLE
    - JOB_DESCRIPTION
    - MODEL_KEY
    - MODEL_TOKEN
    - MODEL_NAME
    - MODEL_LABEL
    - PLOT_LABEL
    - REPORT_LABEL
    - BASE_MODEL_KEY
    - PARENT_MODEL_KEY
    - PARENT_MODEL_TOKEN
    - CHANGE_TOKEN
    - CHANGE_GROUP
    - CHANGE_DETAIL
    - CHANGE_SUMMARY
    - RECIPE_TOKEN
    - RECIPE_FAMILY
    - RECIPE_LABEL
    - INPUT_VARIANT
    - INPUT_TASK
    - INPUT_KEY
    - SOURCE_REPO
    - SOURCE_REF
    - SOURCE_PATH
    - USE_FLOW_SOURCE
    - USE_LOCAL_SOURCE
    - MFCL_BACKEND
    - BACKEND_SCRIPT
    - BACKEND_COMMAND
    - PROGRAM_PATH
    - FLOW_MFCL_PROGRAM
    - MFCL_FRQ
    - MFCL_INI
    - SMOKE_INPUT_PAR
    - SMOKE_OUTPUT_PAR
    - SMOKE_FEVALS
    - SMOKE_PAR
    - MFCL_SMOKE_FAIL_ON_LOG_ERROR
    - MFCL_REQUIRE_DERIVED
    - MFCL_REQUIRE_KEY_QUANTITIES
    - MFCL_SMOKE_LIVE_LOG_STREAM
    - MAKE_TARGETS
    - MAKE_VARS
    - BASE_DIR
    - FLOW_BASE_INPUT_DIR
    - MODEL_DIR
    - PATCH_SCRIPT
    - PATCH_INPUT_DIR
    - PATCH_OUTPUT_DIR
    - PATCH_ARGS
    - INPUT_RECIPE_TO_INI_VERSION
    - INPUT_RECIPE_NORMALIZE_INI
    - INPUT_RECIPE_VALIDATE_INI
    - INPUT_RECIPE_PREFER_MFCLKIT
    - INPUT_RECIPE_FIXED_PARAMS
    - INPUT_RECIPE_INDEX_CV_HALF
    - INPUT_RECIPE_INDEX_FISHERIES
    - INPUT_RECIPE_SEL_NODES
    - INPUT_RECIPE_SEL_FISHERIES
    - INPUT_RECIPE_TAG_MIXING_PERIODS
    - INPUT_RECIPE_TAG_MIXING_GROUPS
    - INPUT_RECIPE_TAG_REPORTING_MULTIPLIER
    - INPUT_RECIPE_TAG_REPORTING_GROUPS
    - INPUT_RECIPE_TAG_REPORTING_FISHERIES
    - INPUT_RECIPE_INI_SECTION
    - INPUT_RECIPE_INI_SECTION_MULTIPLIER
    - INPUT_RECIPE_INI_SECTION_VALUE
    - INPUT_RECIPE_INI_SECTION_ROWS
    - INPUT_RECIPE_INI_SECTION_COLS
    - INPUT_RECIPE_INI_SECTION_EXACT
    - INPUT_RECIPE_REMOVE_START_FILES
    - BASE_SEED_GLOB
    - BASE_SEED_COPY_TO
    - COMPACT_OUTPUTS
    - COLLECT_SOURCE_ARTIFACTS
    - COLLECT_PATHS
    - MFCLKIT_SCRIPT
    - MFCLSHINY_SCRIPT
    - REPORT_TEMPLATE_DIR
    - REPORT_TEMPLATE_MAIN
    - REPORT_RENDER_FORMAT
